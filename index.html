<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SBM-26 Fire Mission Map</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIINfQVLK8C+M1zZzyWGm4p6qJ1B2/k2E0o="
    crossorigin=""
  />

  <style>
    :root {
      --bg: #11150f;
      --panel: #1a2118;
      --panel-2: #222b1f;
      --line: #3f4c37;
      --text: #e7eadb;
      --muted: #a9b49d;
      --accent: #b8c77b;
      --danger: #d96852;
      --warn: #d6ad55;
      --ok: #8fbf72;
      --blue: #70a8d8;
      --shadow: rgba(0,0,0,.45);
      --radius: 16px;
      --safe-area-top: env(safe-area-inset-top, 0px);
      --safe-area-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { overflow: hidden; }

    #app {
      height: 100vh;
      width: 100vw;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background:
        radial-gradient(circle at top left, rgba(184,199,123,.16), transparent 30%),
        linear-gradient(135deg, #0f130d 0%, #181e15 100%);
    }

    header {
      padding: calc(10px + var(--safe-area-top)) 12px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: rgba(17,21,15,.9);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
      z-index: 20;
    }

    .brand { display: flex; flex-direction: column; line-height: 1.05; min-width: 0; }
    .brand .title { font-weight: 800; letter-spacing: .06em; font-size: 14px; white-space: nowrap; }
    .brand .subtitle { color: var(--muted); font-size: 11px; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70vw; }
    .header-actions { display: flex; gap: 7px; flex-shrink: 0; }

    button, select, input, textarea { font: inherit; color: var(--text); }
    button {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, #2a3325, #1b2319);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
      transition: transform .08s ease, border-color .12s ease, background .12s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(.97); }
    button.primary { border-color: rgba(184,199,123,.8); background: linear-gradient(180deg, #536234, #323c24); }
    button.danger { border-color: rgba(217,104,82,.75); background: linear-gradient(180deg, #5c2d25, #331b18); }
    button.selected { outline: 2px solid rgba(184,199,123,.5); background: #3a472c; }
    button.small { font-size: 12px; padding: 6px 9px; }

    #mapWrap { position: relative; min-height: 0; }
